<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickup — Grace Gate Check-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .pickup-container {
      max-width: 560px;
      margin: 0 auto;
      padding-top: 40px;
    }
    .pickup-heading {
      text-align: center;
      margin-bottom: 32px;
    }
    .pickup-heading h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 6px;
    }
    .pickup-heading p {
      font-size: 15px;
      color: var(--color-text-muted);
    }
    .code-input-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }
    .code-input {
      font-family: 'Courier New', monospace;
      font-size: 36px;
      font-weight: 700;
      letter-spacing: 10px;
      text-align: center;
      width: 220px;
      padding: 16px 20px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      color: var(--color-text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      text-transform: uppercase;
    }
    .code-input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 4px rgba(41, 185, 187, 0.15);
    }
    .code-input::placeholder {
      color: var(--color-text-muted);
      letter-spacing: 6px;
      font-size: 28px;
    }
    .pickup-results {
      margin-top: 8px;
    }
    .pickup-child-card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      padding: 18px 24px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .pickup-child-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .pickup-child-name {
      font-size: 17px;
      font-weight: 600;
    }
    .pickup-child-detail {
      font-size: 13px;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pickup-success {
      text-align: center;
      padding: 48px 24px;
    }
    .pickup-success-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--color-success-light);
      color: var(--color-success);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .pickup-success h2 {
      font-size: 28px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .pickup-success p {
      font-size: 15px;
      color: var(--color-text-muted);
    }
    .pickup-success .names {
      font-size: 16px;
      font-weight: 600;
      color: var(--color-text);
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <div id="nav-container"></div>

    <div class="main-content">
      <div class="pickup-container" id="pickup-app"></div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/pickup.js"></script>
</body>
</html>
