<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect — Grace Gate Check-In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1628;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #E8ECF0;
      -webkit-font-smoothing: antialiased;
    }

    .pair-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .pair-card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 48px 36px;
      text-align: center;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .pair-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #29B9BB, #1FA3A5);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(41, 185, 187, 0.25);
    }

    .pair-icon svg {
      width: 36px;
      height: 36px;
      fill: white;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .pair-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .code-input-group {
      margin-bottom: 24px;
    }

    .code-input {
      width: 100%;
      padding: 16px 20px;
      font-size: 28px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      letter-spacing: 8px;
      text-align: center;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: white;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .code-input:focus {
      border-color: #29B9BB;
      box-shadow: 0 0 0 3px rgba(41, 185, 187, 0.2);
    }

    .code-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 4px;
      font-size: 18px;
      font-weight: 500;
    }

    .btn-connect {
      width: 100%;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #29B9BB, #1FA3A5);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 12px rgba(41, 185, 187, 0.3);
    }

    .btn-connect:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(41, 185, 187, 0.4);
    }

    .btn-connect:active {
      transform: translateY(0);
    }

    .btn-connect:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-msg {
      color: #FF6B6B;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }

    .pair-footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .pair-card {
        padding: 36px 24px;
      }
      .code-input {
        font-size: 24px;
        letter-spacing: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="pair-container">
    <div class="pair-card">
      <div class="pair-icon">
        <svg viewBox="0 0 24 24" fill="white" stroke="none">
          <path d="M12 2L8 8H4l8 14 8-14h-4L12 2zM12 4.5L14.5 8h-5L12 4.5z"/>
          <rect x="11" y="16" width="2" height="4" rx="0.5"/>
          <rect x="7" y="20" width="10" height="2" rx="0.5"/>
        </svg>
      </div>
      <h1>Connect to Your Kiosk</h1>
      <p class="pair-subtitle">Enter the 6-character code shown on your check-in kiosk to connect this dashboard.</p>

      <div class="code-input-group">
        <input
          type="text"
          class="code-input"
          id="pairingCode"
          maxlength="6"
          placeholder="------"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
        >
      </div>

      <button class="btn-connect" id="connectBtn" disabled>Connect</button>
      <div class="error-msg" id="errorMsg"></div>

      <p class="pair-footer">
        Open your iPad kiosk app and go to<br>Settings &rarr; Sharing to find your code.
      </p>
    </div>
  </div>

  <script>
    // Redirect if already paired
    (function () {
      const deviceId = localStorage.getItem('ck_kioskDeviceId');
      const name = localStorage.getItem('ck_kioskName');
      const code = localStorage.getItem('ck_pairingCode');
      if (deviceId && name && code) {
        window.location.href = '/dashboard';
        return;
      }
    })();

    const codeInput = document.getElementById('pairingCode');
    const connectBtn = document.getElementById('connectBtn');
    const errorMsg = document.getElementById('errorMsg');

    // Auto-uppercase and enable button when 6 chars entered
    codeInput.addEventListener('input', () => {
      codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      connectBtn.disabled = codeInput.value.length !== 6;
      errorMsg.textContent = '';
    });

    // Enter key
    codeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && codeInput.value.length === 6) {
        connect();
      }
    });

    connectBtn.addEventListener('click', connect);

    async function connect() {
      const code = codeInput.value.trim().toUpperCase();
      if (code.length !== 6) return;

      connectBtn.disabled = true;
      connectBtn.textContent = 'Connecting...';
      errorMsg.textContent = '';

      try {
        // POC: mock pairing — any 6-char code succeeds
        // In production, this will query CloudKit for a KioskPairing record
        // matching the code and retrieve the real kioskDeviceId / kioskName.
        await new Promise((resolve) => setTimeout(resolve, 800));

        localStorage.setItem('ck_kioskDeviceId', 'mock-device-' + code);
        localStorage.setItem('ck_kioskName', 'Demo Church');
        localStorage.setItem('ck_pairingCode', code);

        window.location.href = '/dashboard';
      } catch (err) {
        errorMsg.textContent = 'Failed to connect. Check the code and try again.';
        connectBtn.disabled = false;
        connectBtn.textContent = 'Connect';
      }
    }

    // Auto-focus
    codeInput.focus();
  </script>
</body>
</html>
